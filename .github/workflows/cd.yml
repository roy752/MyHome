name: CD - Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted   # Win10 64bit runner 사용

    env:
      APP_VERSION: "1.0.0"
      DEPLOY_PATH: "C:\\Users\\User\\Desktop\\MineCraft\\FileServer_For_Resourcepack\\files\\myhome"
      DOWNLOAD_BASE_URL: "http://100.108.137.1:11096/download"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Patch AGP version
        run: |
            $file = "android\settings.gradle.kts"
            (Get-Content $file) -replace 'com.android.application" version "[^"]*"', 'com.android.application" version "8.2.1"' |
            Set-Content $file
        shell: powershell


      - name: Get dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Ensure deploy directory exists
        run: |
          if (-not (Test-Path "$env:DEPLOY_PATH")) {
            New-Item -ItemType Directory -Path "$env:DEPLOY_PATH" -Force
          }
        shell: powershell

      - name: Copy apk to deploy path
        run: |
          $src = "build\app\outputs\apk/release\app-release.apk"
          Copy-Item -Path $src -Destination "$env:DEPLOY_PATH\myhome.apk" -Force
        shell: powershell

      - name: Generate metadata JSON
        run: |
          .\scripts\generate_metadata.ps1 `
            -Version "$env:APP_VERSION" `
            -BinaryPath "$env:DEPLOY_PATH\myhome.apk" `
            -DownloadBaseUrl "$env:DOWNLOAD_BASE_URL" `
            -OutputPath "$env:DEPLOY_PATH\metadata.json"
        shell: powershell

      - name: Print deployed files
        run: |
          Write-Host "=== Deployed Files ==="
          Get-ChildItem "$env:DEPLOY_PATH"
          Write-Host "=== metadata.json content ==="
          Get-Content "$env:DEPLOY_PATH\metadata.json"
        shell: powershell